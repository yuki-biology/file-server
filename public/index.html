<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #f0f2f5;
    }
    .container {
      background: #fff; padding: 2rem; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 500px;
    }
    h1 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #333; }
    .drop-zone {
      border: 2px dashed #ccc; border-radius: 8px; padding: 2rem;
      text-align: center; cursor: pointer; transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    .drop-zone.dragover { border-color: #4a90d9; background: #f0f7ff; }
    .drop-zone p { color: #666; }
    .file-list { margin-bottom: 1rem; }
    .file-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem; background: #f9f9f9; border-radius: 4px; margin-bottom: 0.25rem;
      font-size: 0.9rem;
    }
    .file-item .name { color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .file-item .size { color: #888; margin-left: 0.5rem; }
    button {
      width: 100%; padding: 0.75rem; border: none; border-radius: 6px;
      background: #4a90d9; color: #fff; font-size: 1rem; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #357abd; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; display: none; }
    .status.success { display: block; background: #d4edda; color: #155724; }
    .status.error { display: block; background: #f8d7da; color: #721c24; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Upload Files</h1>
    <div class="drop-zone" id="dropZone">
      <p>Drag & drop files here or click to select</p>
    </div>
    <div class="file-list" id="fileList"></div>
    <button id="uploadBtn" disabled>Upload</button>
    <div class="status" id="status"></div>
  </div>
  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.multiple = true;
    const fileList = document.getElementById("fileList");
    const uploadBtn = document.getElementById("uploadBtn");
    const status = document.getElementById("status");
    let selectedFiles = [];

    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
      handleFiles(e.target.files);
      e.target.value = "";
    });

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });
    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
      selectedFiles = Array.from(files);
      renderFileList();
      uploadBtn.disabled = selectedFiles.length === 0;
      status.style.display = "none";
    }

    function renderFileList() {
      fileList.innerHTML = "";
      selectedFiles.forEach((f, i) => {
        const div = document.createElement("div");
        div.className = "file-item";
        div.innerHTML = `<span class="name">${f.name}</span><span class="size">${(f.size / 1024).toFixed(1)} KB</span>`;
        fileList.appendChild(div);
      });
    }

    uploadBtn.addEventListener("click", async () => {
      if (selectedFiles.length === 0) return;
      uploadBtn.disabled = true;
      status.style.display = "none";

      const formData = new FormData();
      selectedFiles.forEach((f) => formData.append("files", f));

      try {
        const res = await fetch("/uploads", { method: "POST", body: formData });
        const data = await res.json();
        if (res.ok) {
          status.className = "status success";
          status.textContent = data.message + " (" + data.files.length + " file(s))";
          selectedFiles = [];
          renderFileList();
          uploadBtn.disabled = true;
        } else {
          status.className = "status error";
          status.textContent = data.message || "Upload failed";
        }
      } catch {
        status.className = "status error";
        status.textContent = "Upload failed";
      }
      status.style.display = "block";
      uploadBtn.disabled = false;
    });
  </script>
</body>
</html>
